# CopyTrade Sim — dev pg_hba.conf
#
# Dev-only: trust auth on all networks so the host (Windows / Mac / Linux)
# can reach Postgres through Docker's bridge without SCRAM-SHA-256 handshake
# issues. Production must replace this with scram-sha-256 + TLS.

local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
host    all             all             0.0.0.0/0               trust
host    all             all             ::/0                    trust
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
