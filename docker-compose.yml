services:
  db:
    image: postgres:17-alpine
    container_name: copytrade_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: copytrade_user
      POSTGRES_PASSWORD: copytrade_password
      POSTGRES_DB: mirror_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - copytrade_pgdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copytrade_user -d mirror_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4.8.1
    container_name: copytrade_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  copytrade_pgdata:
